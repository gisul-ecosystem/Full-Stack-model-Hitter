# Reverse proxy for submit.aaptor.com → Next.js app (:3000)
# Used by the nginx service in docker-compose.yml

upstream vm_to_model_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name submit.aaptor.com;

    # ZIP uploads (matches Next bodySizeLimit)
    client_max_body_size 32m;

    # Optional: ACME HTTP-01 challenges (certbot / Cloudflare origin)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        proxy_pass http://vm_to_model_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering off;
        proxy_request_buffering off;
    }
}

