name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  DEPLOY_HOST: 103.99.38.224
  DEPLOY_USER: ubuntu
  DEPLOY_PATH: /home/ubuntu/vm-to-model
  APP_BASE_URL: https://submit.aaptor.com
  IMAGE_NAME: vm-to-model

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: meta
        run: |
          USERNAME="${{ secrets.DOCKER_USERNAME }}"
          if [ -z "$USERNAME" ]; then
            echo "DOCKER_USERNAME secret is missing"
            exit 1
          fi
          SHA_TAG="${USERNAME}/${IMAGE_NAME}:${GITHUB_SHA}"
          LATEST_TAG="${USERNAME}/${IMAGE_NAME}:latest"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy deploy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "docker-compose.yml,nginx/submit.aaptor.com.conf"
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 0

      - name: Deploy on Ubuntu VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          envs: DOCKER_USERNAME,DOCKER_TOKEN,DOCKER_IMAGE,APP_BASE_URL,DEPLOY_PATH
          script: |
            set -euo pipefail

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed on the VM"
              exit 1
            fi

            mkdir -p "${DEPLOY_PATH}/nginx"
            cd "${DEPLOY_PATH}"

            echo "${DOCKER_TOKEN}" | docker login -u "${DOCKER_USERNAME}" --password-stdin

            export DOCKER_IMAGE
            export APP_BASE_URL

            docker compose pull app nginx
            docker compose up -d --remove-orphans
            docker image prune -f

            docker compose ps
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          DOCKER_IMAGE: ${{ steps.meta.outputs.sha_tag }}
          APP_BASE_URL: ${{ env.APP_BASE_URL }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
